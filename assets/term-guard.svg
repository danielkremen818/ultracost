<svg xmlns="http://www.w3.org/2000/svg" width="1004" height="486" viewBox="0 0 1004 486" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" role="img" aria-label="ultracost terminal: ultracost check — the Workflow Guard">
