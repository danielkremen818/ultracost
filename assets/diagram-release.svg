<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 470" role="img" aria-label="release pipeline: a vX.Y.Z tag runs CI tests, which cuts a GitHub Release and publishes to npm"><style>
    .title      { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
                  fill: #c4b5fd; letter-spacing: 0.09em; text-transform: uppercase; }
