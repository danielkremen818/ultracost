    .legend-h   { font: 700 12px -apple-system, system-ui, sans-serif; fill: #e9d5ff; letter-spacing: 0.06em; text-transform: uppercase; }
    .footer     { font: 500 10px ui-monospace, Menlo, monospace; fill: #6d5a8c; }

