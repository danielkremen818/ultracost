name: Feature request
description: Suggest an enhancement for ultracost
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ultracost is intentionally narrow — Claude Code `ultracode` / dynamic
        workflows only. Requests that keep that scope are most likely to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that ultracost makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like ultracost to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or existing tools you've tried.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays within Claude Code `ultracode` / dynamic-workflow routing (not a multi-harness request).
          required: true
