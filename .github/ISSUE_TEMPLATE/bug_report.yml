name: Bug report
description: Report a defect in ultracost (CLI, plugin, guard, or estimate)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do **not** include secrets or private file
        contents. For a suspected security issue, use the Security tab →
        "Report a vulnerability" instead of this form.
  - type: input
    id: version
    attributes:
      label: ultracost version
      description: Output of `ultracost --version` (or the plugin version).
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which surface are you using?
      options:
        - npm CLI
        - Claude Code plugin
        - Both
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.x"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal command sequence or workflow snippet that triggers it.
      render: shell
    validations:
      required: true
