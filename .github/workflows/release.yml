name: Release

on:
  push:
    tags: ["v*"]

# Least privilege by default; the release job elevates only what it needs.
permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload signed assets
      id-token: write # OIDC for npm Trusted Publishing + provenance + cosign keyless
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm test

      # Node 24's bundled npm (>= 11.13) already supports Trusted Publishing (OIDC)
      # and --provenance, so we use it as-is — no unpinned `npm install -g npm`.

      # Build the publishable tarball so we can sign exactly what ships.
      - name: Pack tarball
        id: pack
        run: |
          tgz="$(npm pack | tail -n1)"
          echo "tgz=$tgz" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless (OIDC) signature over the exact tarball. cosign's current default
      # writes a Sigstore bundle; we name it ".sigstore.json" — the extension the
      # OpenSSF Scorecard Signed-Releases check recognizes — and attach it to the
      # GitHub Release so the artifact is cryptographically verifiable.
      - name: Sign tarball (cosign keyless)
        run: |
          tgz="${{ steps.pack.outputs.tgz }}"
          cosign sign-blob --yes "$tgz" --bundle "$tgz.sigstore.json"

      - name: GitHub Release (with signed artifacts)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.tgz }}
            ${{ steps.pack.outputs.tgz }}.sigstore.json

      # No NODE_AUTH_TOKEN: authentication is via OIDC (Trusted Publishing),
      # configured on npmjs.com for this repo + workflow. --provenance attaches
      # a signed provenance attestation on the npm registry side.
      - name: Publish to npm
        run: npm publish --provenance --access public
